name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  completions:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build native binary
        run: cargo build -p mcat

      - name: Generate shell completions
        run: |
          mkdir -p completions
          ./target/debug/mcat --generate bash        > completions/mcat.bash
          ./target/debug/mcat --generate zsh         > completions/_mcat
          ./target/debug/mcat --generate fish        > completions/mcat.fish
          ./target/debug/mcat --generate powershell  > completions/mcat.ps1

      - name: Upload completions
        uses: actions/upload-artifact@v4
        with:
          name: completions
          path: completions/

  build:
    name: build (${{ matrix.target }})
    needs: completions
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
          - target: x86_64-pc-windows-gnu
            os: ubuntu-22.04
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Download completions
        uses: actions/download-artifact@v4
        with:
          name: completions
          path: completions/

      - name: Build
        run: cargo zigbuild --profile dist --target ${{ matrix.target }} -p mcat

      - name: Package (Unix)
        if: matrix.archive != 'zip'
        shell: bash
        run: |
          PKG=mcat-${{ matrix.target }}
          mkdir -p $PKG
          cp target/${{ matrix.target }}/dist/mcat $PKG/
          cp LICENSE $PKG/
          cp README.md $PKG/
          cp CHANGELOG.md $PKG/
          cp -r completions $PKG/
          # TODO: add man page
          sha256sum $PKG/mcat > $PKG/mcat.sha256
          tar cJf $PKG.tar.xz $PKG

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          PKG=mcat-${{ matrix.target }}
          mkdir -p $PKG
          cp target/${{ matrix.target }}/dist/mcat.exe $PKG/
          cp LICENSE $PKG/
          cp README.md $PKG/
          cp CHANGELOG.md $PKG/
          cp -r completions $PKG/
          # TODO: add man page
          sha256sum $PKG/mcat.exe > $PKG/mcat.sha256
          zip -r $PKG.zip $PKG

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.target }}
          path: |
            mcat-${{ matrix.target }}.${{ matrix.archive != 'zip' && 'tar.xz' || 'zip' }}

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifact-*
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.ref_name }}" =~ (alpha|beta|rc|pre) ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            $PRERELEASE \
            artifacts/*
