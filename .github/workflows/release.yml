name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"

jobs:
  completions:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build native binary
        run: cargo build -p mcat

      - name: Generate shell completions
        run: |
          mkdir -p completions
          ./target/debug/mcat --generate bash        > completions/mcat.bash
          ./target/debug/mcat --generate zsh         > completions/_mcat
          ./target/debug/mcat --generate fish        > completions/mcat.fish
          ./target/debug/mcat --generate powershell  > completions/mcat.ps1

      - name: Upload completions
        uses: actions/upload-artifact@v4
        with:
          name: completions
          path: completions/

  build:
    name: build (${{ matrix.target }})
    needs: completions
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            use_zigbuild: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04-arm
            use_zigbuild: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: cargo install cargo-zigbuild

      - name: Install Zig
        if: matrix.use_zigbuild
        uses: goto-bus-stop/setup-zig@v2

      - name: Download completions
        uses: actions/download-artifact@v4
        with:
          name: completions
          path: completions/

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.use_zigbuild }}" == "true" ]]; then
            cargo zigbuild --profile dist --target ${{ matrix.target }} -p mcat
          else
            cargo build --profile dist --target ${{ matrix.target }} -p mcat
          fi

      - name: Package (Unix)
        if: matrix.archive != 'zip'
        shell: bash
        run: |
          PKG=mcat-${{ github.ref_name }}-${{ matrix.target }}
          mkdir -p $PKG
          cp target/${{ matrix.target }}/dist/mcat $PKG/
          cp LICENSE $PKG/
          cp README.md $PKG/
          cp CHANGELOG.md $PKG/
          cp -r completions $PKG/
          # TODO: add man page
          tar cJf $PKG.tar.xz $PKG
          sha256sum $PKG.tar.xz > $PKG.tar.xz.sha256

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          PKG=mcat-${{ github.ref_name }}-${{ matrix.target }}
          mkdir -p $PKG
          cp target/${{ matrix.target }}/dist/mcat.exe $PKG/
          cp LICENSE $PKG/
          cp README.md $PKG/
          cp CHANGELOG.md $PKG/
          cp -r completions $PKG/
          # TODO: add man page
          7z a $PKG.zip $PKG
          sha256sum $PKG.zip > $PKG.zip.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.target }}
          path: |
            mcat-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive != 'zip' && 'tar.xz' || 'zip' }}
            mcat-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive != 'zip' && 'tar.xz' || 'zip' }}.sha256

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifact-*
          path: artifacts/
          merge-multiple: true

      - name: Extract changelog
        run: |
          awk '
            /^## / {
              if (found) exit
              found = 1
              next
            }
            found { print }
          ' CHANGELOG.md | awk '
            /./ { found = 1 }
            found { lines[NR] = $0; last = NR }
            END {
              for (i = last; i >= 1; i--) {
                if (lines[i] ~ /./) { last = i; break }
              }
              started = 0
              for (i = 1; i <= last; i++) {
                if (!started && lines[i] !~ /./) continue
                started = 1
                print lines[i]
              }
            }
          ' > changelog_section.md

          if [ ! -s changelog_section.md ]; then
            echo "_No changelog entry for this release._" > changelog_section.md
          fi

          echo "--- Extracted changelog ---"
          cat changelog_section.md
          echo "---"

      - name: Generate release notes
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          {
            echo "## Changelog"
            echo ""
            cat changelog_section.md
            echo ""
            cat << EOF
          ## Install

          **Linux / macOS**
          \`\`\`bash
          curl -fsSL ${BASE_URL}/install.sh | sh
          \`\`\`

          **PowerShell (Windows)**
          \`\`\`powershell
          irm ${BASE_URL}/install.ps1 | iex
          \`\`\`

          ## Download

          | File | Platform | Checksum |
          |------|----------|----------|
          | [mcat-${TAG}-x86_64-apple-darwin.tar.xz](${BASE_URL}/mcat-${TAG}-x86_64-apple-darwin.tar.xz) | Intel macOS | [checksum](${BASE_URL}/mcat-${TAG}-x86_64-apple-darwin.tar.xz.sha256) |
          | [mcat-${TAG}-aarch64-apple-darwin.tar.xz](${BASE_URL}/mcat-${TAG}-aarch64-apple-darwin.tar.xz) | Apple Silicon macOS | [checksum](${BASE_URL}/mcat-${TAG}-aarch64-apple-darwin.tar.xz.sha256) |
          | [mcat-${TAG}-x86_64-unknown-linux-gnu.tar.xz](${BASE_URL}/mcat-${TAG}-x86_64-unknown-linux-gnu.tar.xz) | x64 Linux (gnu) | [checksum](${BASE_URL}/mcat-${TAG}-x86_64-unknown-linux-gnu.tar.xz.sha256) |
          | [mcat-${TAG}-aarch64-unknown-linux-gnu.tar.xz](${BASE_URL}/mcat-${TAG}-aarch64-unknown-linux-gnu.tar.xz) | ARM64 Linux (gnu) | [checksum](${BASE_URL}/mcat-${TAG}-aarch64-unknown-linux-gnu.tar.xz.sha256) |
          | [mcat-${TAG}-x86_64-unknown-linux-musl.tar.xz](${BASE_URL}/mcat-${TAG}-x86_64-unknown-linux-musl.tar.xz) | x64 Linux (musl) | [checksum](${BASE_URL}/mcat-${TAG}-x86_64-unknown-linux-musl.tar.xz.sha256) |
          | [mcat-${TAG}-aarch64-unknown-linux-musl.tar.xz](${BASE_URL}/mcat-${TAG}-aarch64-unknown-linux-musl.tar.xz) | ARM64 Linux (musl) | [checksum](${BASE_URL}/mcat-${TAG}-aarch64-unknown-linux-musl.tar.xz.sha256) |
          | [mcat-${TAG}-x86_64-pc-windows-msvc.zip](${BASE_URL}/mcat-${TAG}-x86_64-pc-windows-msvc.zip) | x64 Windows | [checksum](${BASE_URL}/mcat-${TAG}-x86_64-pc-windows-msvc.zip.sha256) |
          EOF
          } > notes.md

      - name: Generate install scripts
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          cat > artifacts/install.sh << EOF
          #!/usr/bin/env bash
          set -e

          BASE_URL="${BASE_URL}"
          TAG="${TAG}"
          BIN_DIR="\$HOME/.local/bin"
          mkdir -p "\$BIN_DIR"

          OS=\$(uname -s)
          ARCH=\$(uname -m)

          case "\$OS" in
            Linux)
              case "\$ARCH" in
                x86_64)  TARGET="x86_64-unknown-linux-musl" ;;
                aarch64) TARGET="aarch64-unknown-linux-musl" ;;
                *) echo "Unsupported architecture: \$ARCH"; exit 1 ;;
              esac
              ;;
            Darwin)
              case "\$ARCH" in
                x86_64)  TARGET="x86_64-apple-darwin" ;;
                arm64)   TARGET="aarch64-apple-darwin" ;;
                *) echo "Unsupported architecture: \$ARCH"; exit 1 ;;
              esac
              ;;
            *) echo "Unsupported OS: \$OS"; exit 1 ;;
          esac

          URL="\${BASE_URL}/mcat-\${TAG}-\${TARGET}.tar.xz"
          echo "Downloading mcat for \${TARGET}..."
          curl -fsSL "\$URL" | tar -xJ --strip-components=1 -C "\$BIN_DIR" --wildcards "*/mcat"
          chmod +x "\$BIN_DIR/mcat"
          echo "Installed mcat to \$BIN_DIR/mcat"
          echo "Make sure \$BIN_DIR is in your PATH"
          EOF
          chmod +x artifacts/install.sh

          cat > artifacts/install.ps1 << EOF
          \$ErrorActionPreference = "Stop"

          \$BaseUrl = "${BASE_URL}"
          \$Tag = "${TAG}"
          \$BinDir = "\$env:USERPROFILE\.local\bin"
          New-Item -ItemType Directory -Force -Path \$BinDir | Out-Null

          \$Url = "\$BaseUrl/mcat-\$Tag-x86_64-pc-windows-msvc.zip"
          \$Tmp = "\$env:TEMP\mcat.zip"
          Write-Host "Downloading mcat..."
          Invoke-WebRequest -Uri \$Url -OutFile \$Tmp
          Expand-Archive -Path \$Tmp -DestinationPath "\$env:TEMP\mcat-extracted" -Force
          Copy-Item "\$env:TEMP\mcat-extracted\mcat-\$Tag-x86_64-pc-windows-msvc\mcat.exe" "\$BinDir\mcat.exe" -Force
          Remove-Item \$Tmp
          Remove-Item "\$env:TEMP\mcat-extracted" -Recurse
          Write-Host "Installed mcat to \$BinDir\mcat.exe"
          Write-Host "Make sure \$BinDir is in your PATH"
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.ref_name }}" =~ (alpha|beta|rc|pre) ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file notes.md \
            $PRERELEASE \
            artifacts/*
